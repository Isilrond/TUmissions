<head>

    <title>Tyrant Unleashed - Missions & Rewards Catalogue</title>
    <style>
        :root {
            --bg-color: #1a1c23;
            --card-bg: #242834;
            --accent-color: #ff9f43;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: #3b4256;
            --table-hover: #2d3242;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .controls input, .controls select {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 4px;
            font-size: 1rem;
            flex: 1;
        }

        .controls select {
            flex: 0 0 200px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #2d3242;
            color: var(--accent-color);
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            background-color: var(--border-color);
        }

        tr:hover {
            background-color: var(--table-hover);
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .badge-mission { background-color: #2ecc71; color: #fff; }
        .badge-achievement { background-color: #9b59b6; color: #fff; }
    </style>
</head>

        <header>

        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const typeFilter = document.getElementById('typeFilter');

        let currentSortCol = -1;
        let sortAsc = true;

        function renderTable(renderData) {
            tableBody.innerHTML = '';
            renderData.forEach(row => {
                const tr = document.createElement('tr');
                const badgeClass = row['Row Type'] === 'Mission Reward' ? 'badge-mission' : 'badge-achievement';
                
                tr.innerHTML = `
                    <td>${row['Mission ID']}</td>
                    <td>${row['Mission Name']}</td>
                    <td>${row['Energy']}</td>
                    <td><span class="badge ${badgeClass}">${row['Row Type']}</span></td>
                    <td>${row['Level']}</td>
                    <td>${row['Reward Type']}</td>
                    <td>${row['Reward']}</td>
                    <td>${row['Achievement Name (may not match mission)'] || '-'}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function filterData() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedType = typeFilter.value;

            const filtered = data.filter(row => {
                const matchesSearch = 
                    String(row['Mission ID']).toLowerCase().includes(searchTerm) ||
                    String(row['Mission Name']).toLowerCase().includes(searchTerm) ||
                    String(row['Reward']).toLowerCase().includes(searchTerm) ||
                    String(row['Reward Type']).toLowerCase().includes(searchTerm) ||
                    String(row['Achievement Name (may not match mission)']).toLowerCase().includes(searchTerm);
                
                const matchesType = !selectedType || row['Row Type'] === selectedType;
                
                return matchesSearch && matchesType;
            });

            renderTable(filtered);
        }

        function sortTable(colIndex) {
            if (currentSortCol === colIndex) {
                sortAsc = !sortAsc;
            } else {
                currentSortCol = colIndex;
                sortAsc = true;
            }

            const keys = [
                'Mission ID', 
                'Mission Name', 
                'Energy', 
                'Row Type', 
                'Level', 
                'Reward Type', 
                'Reward', 
                'Achievement Name (may not match mission)'
            ];
            const key = keys[colIndex];

            data.sort((a, b) => {
                let valA = a[key];
                let valB = b[key];

                if (typeof valA === 'number' && typeof valB === 'number') {
                    return sortAsc ? valA - valB : valB - valA;
                }
                
                valA = String(valA).toLowerCase();
                valB = String(valB).toLowerCase();
                
                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });

            filterData();
        }

        searchInput.addEventListener('input', filterData);
        typeFilter.addEventListener('change', filterData);

        // Initial setup execution
        renderTable(data);
