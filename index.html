<html lang="de">
<head>
    <meta charset="UTF-8">

    <title>Tyrant Unleashed - Missions- & Belohnungskatalog</title>
    <style>
        :root {
            --bg-color: #1a1c23;
            --card-bg: #242834;
            --accent-color: #ff9f43;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: #3b4256;
            --table-hover: #2d3242;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-muted);
            font-style: italic;
        }

        .search-container {
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 20px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(255, 159, 67, 0.5);
        }

        select {
            padding: 12px 20px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 1rem;
            cursor: pointer;
        }

        .stats {
            margin-bottom: 15px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .table-responsive {
            overflow-x: auto;
            background-color: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #1e222b;
            color: var(--accent-color);
            padding: 15px;
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            background-color: #252a36;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        tr:hover td {
            background-color: var(--table-hover);
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-base {
            background-color: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.4);
        }

        .badge-reward {
            background-color: rgba(52, 152, 219, 0.2);
            color: #3498db;
            border: 1px solid rgba(52, 152, 219, 0.4);
        }

        .energy-tag {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>

    const searchInput = document.getElementById('searchInput');
    const typeFilter = document.getElementById('typeFilter');
    const tableBody = document.getElementById('tableBody');
    const statsDisplay = document.getElementById('statsDisplay');

    let currentSortCol = -1;
    let sortAsc = true;

    function renderTable(filteredData) {
        tableBody.innerHTML = '';
        
        filteredData.forEach(row => {
            const tr = document.createElement('tr');
            
            const badgeClass = row['Row Type'] === 'Base (1st Clear)' ? 'badge-base' : 'badge-reward';
            
            tr.innerHTML = `
                <td style="color: var(--text-muted); font-weight: bold;">${row['Mission ID']}</td>
                <td style="font-weight: 500;">${row['Mission Name']}</td>
                <td><span class="energy-tag">${row['Energy']}</span></td>
                <td><span class="badge ${badgeClass}">${row['Row Type']}</span></td>
                <td>${row['Level']}</td>
                <td>${row['Reward Type']}</td>
                <td style="color: #f1c40f; font-weight: 500;">${row['Reward']}</td>
                <td style="font-size: 0.9rem; color: var(--text-muted);">${row['Achievement Name (may not match mission)']}</td>
            `;
            tableBody.appendChild(tr);
        });
        
        statsDisplay.textContent = `Einträge gefunden: ${filteredData.length} von ${data.length}`;
    }

    function filterData() {
        const searchTerm = searchInput.value.toLowerCase();
        const selectedType = typeFilter.value;

        const filtered = data.filter(row => {
            const matchesSearch = 
                row['Mission Name'].toLowerCase().includes(searchTerm) ||
                row['Reward'].toLowerCase().includes(searchTerm) ||
                row['Achievement Name (may not match mission)'].toLowerCase().includes(searchTerm) ||
                row['Reward Type'].toLowerCase().includes(searchTerm);
                
            const matchesType = !selectedType || row['Row Type'] === selectedType;
            
            return matchesSearch && matchesType;
        });

        renderTable(filtered);
    }

    function sortTable(colIndex) {
        if (currentSortCol === colIndex) {
            sortAsc = !sortAsc;
        } else {
            currentSortCol = colIndex;
            sortAsc = true;
        }

        const keys = [
            'Mission ID', 
            'Mission Name', 
            'Energy', 
            'Row Type', 
            'Level', 
            'Reward Type', 
            'Reward', 
            'Achievement Name (may not match mission)'
        ];
        const key = keys[colIndex];

        data.sort((a, b) => {
            let valA = a[key];
            let valB = b[key];

            if (typeof valA === 'number' && typeof valB === 'number') {
                return sortAsc ? valA - valB : valB - valA;
            }
            
            valA = String(valA).toLowerCase();
            valB = String(valB).toLowerCase();
            
            if (valA < valB) return sortAsc ? -1 : 1;
            if (valA > valB) return sortAsc ? 1 : -1;
            return 0;
        });

        filterData();
    }

    searchInput.addEventListener('input', filterData);
    typeFilter.addEventListener('change', filterData);

    // Initial Render
    renderTable(data);
</script>
